<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats · Pickleball Chiro</title>
  <!-- TODO: Replace localStorage tracking with Plausible or Fathom for persistent analytics -->

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NV3RTC7XXK"></script>
  <script src="/analytics.js"></script>

  <style>
    body { font-family: monospace; padding: 28px; background: #fff; color: #111; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .note { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
    h2 { font-size: 1rem; margin: 24px 0 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 8px; }
    th, td { border: 1px solid #ccc; padding: 7px 12px; text-align: left; font-size: 0.85rem; }
    th { background: #f5f5f5; }
    .empty { color: #999; margin-top: 12px; font-size: 0.9rem; }
    .clear-btn { margin-top: 24px; padding: 8px 16px; cursor: pointer; font-family: monospace; font-size: 0.85rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; }
    .clear-btn:hover { background: #fee; border-color: #c00; color: #c00; }
  </style>
</head>
<body>
  <h1>&#x1F4CA; Site Click Events</h1>
  <p class="note">
    These events are stored in <em>this browser's</em> localStorage — only visible on the device where the clicks happened.<br />
    To get real cross-device analytics, see the TODO comment in js/main.js.
  </p>

  <div id="stats-output"></div>
  <button class="clear-btn" id="clear-btn">Clear All Events</button>

  <script>
    const output  = document.getElementById('stats-output');
    const clearBtn = document.getElementById('clear-btn');

    function renderStats() {
      const events = JSON.parse(localStorage.getItem('pb_events') || '[]');

      if (events.length === 0) {
        output.innerHTML = '<p class="empty">No events recorded yet. Tap some buttons on the main page first, then come back here.</p>';
        return;
      }

      // Summary counts
      const counts = {};
      events.forEach(function (ev) {
        counts[ev.label] = (counts[ev.label] || 0) + 1;
      });

      let html = '<h2>Summary (' + events.length + ' total clicks)</h2>';
      html += '<table><thead><tr><th>Button / Link</th><th>Total Clicks</th></tr></thead><tbody>';
      Object.entries(counts)
        .sort(function (a, b) { return b[1] - a[1]; })
        .forEach(function (entry) {
          html += '<tr><td>' + entry[0] + '</td><td>' + entry[1] + '</td></tr>';
        });
      html += '</tbody></table>';

      // Full log, newest first
      html += '<h2>Full Log (newest first)</h2>';
      html += '<table><thead><tr><th>#</th><th>Label</th><th>Timestamp</th></tr></thead><tbody>';
      var reversed = events.slice().reverse();
      reversed.forEach(function (ev, i) {
        html += '<tr><td>' + (events.length - i) + '</td><td>' + ev.label + '</td><td>' + ev.timestamp + '</td></tr>';
      });
      html += '</tbody></table>';

      output.innerHTML = html;
    }

    renderStats();

    clearBtn.addEventListener('click', function () {
      if (confirm('Delete all stored click events?')) {
        localStorage.removeItem('pb_events');
        renderStats();
      }
    });
  </script>
</body>
</html>
