// ============================================================
//  STATE
// ============================================================
let currentQ    = 0;
let answers     = [];   // answers[i] = points chosen for question i
let busy        = false;

// ============================================================
//  ENTRY
// ============================================================
function startQuiz() {
  currentQ = 0;
  answers  = [];
  showProgress(true);
  updateProgress();
  switchScreen("screen-intro", "screen-question", false, () => renderQuestion(0));
}

// ============================================================
//  RENDER A QUESTION
// ============================================================
function renderQuestion(index) {
  const q = questions[index];

  document.getElementById("qText").textContent = q.text;

  const container = document.getElementById("answersContainer");
  container.innerHTML = "";

  q.answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.setAttribute("role", "listitem");
    btn.style.animationDelay = (i * 0.06) + "s";  // staggered entrance
    btn.textContent = a.text;
    if (answers[index] === a.points) btn.classList.add("selected");

    btn.addEventListener("click", () => pickAnswer(index, a.points, btn));
    container.appendChild(btn);
  });

  const backBtn = document.getElementById("backBtn");
  backBtn.className = index === 0 ? "back-btn" : "back-btn visible";

  updateProgress();
}

// ============================================================
//  PICK AN ANSWER
// ============================================================
function pickAnswer(qIndex, points, btn) {
  if (busy) return;

  // Visual tap feedback
  btn.classList.add("selected");
  answers[qIndex] = points;

  setTimeout(() => {
    if (qIndex < questions.length - 1) {
      // Fade content within the same screen, then show next question
      const nextIndex = qIndex + 1;
      fadeContent(() => {
        currentQ = nextIndex;
        renderQuestion(nextIndex);
      });
    } else {
      showResults();
    }
  }, 180);
}

// ============================================================
//  BACK
// ============================================================
function goBack() {
  if (busy) return;
  if (currentQ === 0) {
    showProgress(false);
    switchScreen("screen-question", "screen-intro", true);
    return;
  }
  const prevIndex = currentQ - 1;
  fadeContent(() => {
    currentQ = prevIndex;
    renderQuestion(prevIndex);
  }, true);
}

// ============================================================
//  COMPUTE & SHOW RESULTS
// ============================================================
function showResults() {
  const scores = { first_four_shots: 0, shot_selection: 0, transition_zone: 0, physical: 0 };
  questions.forEach((q, i) => { if (answers[i] !== undefined) scores[q.category] += answers[i]; });

  const min        = Math.min(...Object.values(scores));
  const lowestCats = Object.keys(scores).filter(k => scores[k] === min);
  const key        = lowestCats.length > 1 ? "tie" : lowestCats[0];
  const r          = results[key];

  // Build score bars HTML
  const barsHTML = Object.entries(scores).map(([cat, score]) => {
    const isLow  = lowestCats.includes(cat);
    const pctTgt = Math.round((score / 9) * 100);
    return `
      <div class="score-row">
        <div class="score-row-meta">
          <span class="score-cat-name ${isLow ? "lowest" : ""}">${CATEGORY_NAMES[cat]}</span>
          <span class="score-num ${isLow ? "lowest" : ""}">${score}/9</span>
        </div>
        <div class="score-track">
          <div class="score-bar filled ${isLow ? "lowest" : ""}" data-target="${pctTgt}"></div>
        </div>
      </div>`;
  }).join("");

  document.getElementById("resultContent").innerHTML = `
    <div class="result-tag">Your Diagnosis</div>
    <h2 class="result-headline">${r.headline}</h2>
    <p class="result-body">${r.body}</p>
    <div class="score-section">
      <p class="score-section-label">Your score breakdown</p>
      ${barsHTML}
    </div>
    <div class="cta-card">
      <p class="cta-card-header">${r.ctaHeader}</p>
      <p class="cta-card-body">${r.ctaBody}</p>
      <a href="${BOOKING_LINK}" class="btn-primary" target="_blank" rel="noopener noreferrer" data-track="quiz_calendly_cta">Book My Free Game Diagnosis</a>
    </div>
    <p class="footage-note">This call involves reviewing real footage of your game — I'll send you simple instructions after you book.</p>
  `;

  // Log completion to GA4 with the diagnosed category
  if (typeof window.gtag === "function") {
    window.gtag("event", "quiz_complete", { result: key });
  }

  showProgress(false);
  switchScreen("screen-question", "screen-result", false, () => {
    // Animate bars after screen transition settles
    setTimeout(() => {
      document.querySelectorAll(".score-bar[data-target]").forEach(bar => {
        bar.style.width = bar.dataset.target + "%";
      });
    }, 80);
  });
}

// ============================================================
//  PROGRESS BAR
// ============================================================
function showProgress(on) {
  const rail    = document.getElementById("progressRail");
  const counter = document.getElementById("qCounter");
  rail.style.background   = on ? "" : "transparent";
  counter.style.visibility = on ? "visible" : "hidden";
}

function updateProgress() {
  const pct = (currentQ / questions.length) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("qCounter").textContent =
    `Question ${currentQ + 1} of ${questions.length}`;
}

// ============================================================
//  TRANSITIONS
// ============================================================

// Fade content within screen-question (question → question)
function fadeContent(callback, reverse = false) {
  if (busy) return;
  busy = true;
  const scr = document.getElementById("screen-question");
  scr.style.transition = "opacity 0.16s ease";
  scr.style.opacity = "0";
  setTimeout(() => {
    if (callback) callback();
    scr.style.opacity = "1";
    setTimeout(() => {
      scr.style.transition = "";
      busy = false;
    }, 160);
  }, 160);
}

// Slide between different screens
function switchScreen(fromId, toId, reverse, callback) {
  if (busy) return;
  busy = true;

  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);

  // Backward transitions need to enter from the left; set before it becomes visible
  if (reverse) to.style.transform = "translateX(-40px)";

  // Exit the current screen
  from.classList.add(reverse ? "exit-right" : "exit-left");
  from.classList.remove("active");

  setTimeout(() => {
    from.classList.remove("exit-left", "exit-right");
    to.scrollTop = 0;
    if (callback) callback();

    // Adding active makes visibility:visible and triggers CSS transition
    to.classList.add("active");

    // For backward: flush current position then clear inline override so
    // the CSS transition animates from -40px → 0
    if (reverse) {
      to.getBoundingClientRect();
      to.style.transform = "";
    }

    setTimeout(() => { busy = false; }, 280);
  }, 220);
}

// ============================================================
//  CLICK TRACKING — mirrors main.js (localStorage + GA4)
// ============================================================
document.addEventListener("click", function (e) {
  const target = e.target.closest("[data-track]");
  if (!target) return;
  const label = target.getAttribute("data-track");
  const event = { event: "click", label: label, timestamp: new Date().toISOString() };
  console.log("[Pickleball Chiro Analytics]", event);
  const stored = JSON.parse(localStorage.getItem("pb_events") || "[]");
  stored.push(event);
  localStorage.setItem("pb_events", JSON.stringify(stored));
  if (typeof window.gtag === "function") {
    window.gtag("event", "cta_click", { label: label });
  }
});
</script>
